<!DOCTYPE html>
<html>

<head>

    <title>Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {

            font-family: 'Poppins';

            background: linear-gradient(135deg, #6a11cb, #2575fc);

            color: white;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            margin: 0;

        }


        .card {

            background: rgba(255, 255, 255, 0.12);

            padding: 40px;

            border-radius: 20px;

            text-align: center;

            backdrop-filter: blur(15px);

        }


        button {

            display: block;

            width: 220px;

            padding: 12px;

            margin: 12px auto;

            border: none;

            border-radius: 10px;

            background: white;

            color: #6a11cb;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }


        button:hover {

            transform: scale(1.05);

            background: #f3e8ff;

        }
    </style>

</head>


<body>


    <div class="card" style="width: 800px; max-width: 90%;">

        <h1>Quiz Submitted Successfully!</h1>

        <h2 id="scoreDisplay" style="margin-top:20px;"></h2>
        <h3 id="feedbackMessage" style="margin-bottom: 20px;"></h3>

        <button id="viewBtn" onclick="viewScore()">
            View Score & Review
        </button>

        <div id="reviewSection"
            style="display:none; text-align: left; max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;">
        </div>

        <button id="certBtn" onclick="getCertificate()" style="display:none; background: #fbbf24; color: black;">
            Get Certificate
        </button>


        <button onclick="goHome()">

            Home

        </button>


        <button onclick="goDashboard()">

            Dashboard

        </button>


    </div>



    <script>


        function viewScore() {

            let params = new URLSearchParams(window.location.search);
            let quizId = params.get("id");
            let quiz = JSON.parse(localStorage.getItem(quizId));
            let answers = JSON.parse(localStorage.getItem("studentAnswers_" + quizId));

            let score = 0;
            let reviewHTML = "";

            quiz.questions.forEach((q, i) => {

                let isCorrect = (answers[i] == q.answer);

                if (isCorrect) {
                    score++;
                }

                reviewHTML += `<div style="background: rgba(255,255,255,0.08); padding: 15px; margin: 10px 0; border-radius: 10px;">`;
                reviewHTML += `<div style="margin-bottom: 10px;"><strong>Q${i + 1}. ${q.question}</strong></div>`;

                let studentAns = answers[i] || "Not answered";

                if (isCorrect) {
                    reviewHTML += `<div>Your Answer: <span style="color: #22c55e; font-weight: bold;">${studentAns}</span> <span style="font-size: 18px;">✅</span></div>`;
                } else {
                    reviewHTML += `<div style="margin-bottom: 5px;">Your Answer: <span style="color: #ef4444; font-weight: bold; text-decoration: line-through;">${studentAns}</span> <span style="font-size: 18px;">❌</span></div>`;
                    reviewHTML += `<div>Correct Answer: <span style="color: #22c55e; font-weight: bold;">${q.answer}</span></div>`;
                }

                reviewHTML += `</div>`;

            });

            document.getElementById("scoreDisplay").innerText = "Your Score: " + score + " / " + quiz.questions.length;

            let percentage = (score / quiz.questions.length) * 100;
            let feedbackEl = document.getElementById("feedbackMessage");

            if (percentage > 80) {
                feedbackEl.innerText = "Excellent work!";
                feedbackEl.style.color = "#22c55e"; // Green
                document.getElementById("certBtn").style.display = "block"; // Show cert button
            } else if (percentage >= 50) {
                feedbackEl.innerText = "Good job, but room for improvement.";
                feedbackEl.style.color = "#fde047"; // Yellow
            } else {
                feedbackEl.innerText = "Keep practicing!";
                feedbackEl.style.color = "#ef4444"; // Red
            }

            document.getElementById("reviewSection").innerHTML = reviewHTML;
            document.getElementById("reviewSection").style.display = "block";
            document.getElementById("viewBtn").style.display = "none"; // hide the button

        }

        function getCertificate() {
            let params = new URLSearchParams(window.location.search);
            let quizId = params.get("id");
            window.location.href = "certificate.html?id=" + quizId;
        }


        // HOME BUTTON

        function goHome() {

            window.location.href = "index.html";

        }


        // DASHBOARD BUTTON

        function goDashboard() {

            window.location.href = "student.html";

        }


    </script>


</body>

</html>
